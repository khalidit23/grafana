services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /home/maestro/mikrotik-grafana/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    environment:
      - TZ=Asia/Dhaka
    restart: unless-stopped
    depends_on:
      - victoriametrics

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /home/maestro/mikrotik-grafana/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/maestro/mikrotik-grafana/prometheus/data:/prometheus/data
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus/data"
      - "--storage.tsdb.retention.time=30d"
    environment:
      - TZ=Asia/Dhaka
    restart: unless-stopped
    depends_on:
      - snmp-exporter
      - victoriametrics

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    ports:
      - "9116:9116"
    volumes:
      - /home/maestro/mikrotik-grafana/snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    environment:
      - TZ=Asia/Dhaka
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.139.0
    container_name: victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - /home/maestro/mikrotik-grafana/victoriametrics-data:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=12"
    environment:
      - TZ=Asia/Dhaka
    restart: unless-stopped

volumes:
  grafana_data:
